# fly.toml app configuration file generated for prograrmor-back on 2026-03-21T18:44:23+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'prograrmor-back'
primary_region = 'cdg'

[build]

[http_service]
  internal_port = 8800
  force_https = true
  # `suspend` évite des temps de reprise plus longs (moins de risques de 502 lors de callbacks OAuth).
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  # Garde au moins 1 machine en cours pour les routes sensibles (OAuth callbacks).
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
